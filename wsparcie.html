<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TravelPay - Wsparcie</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f6f8;
  --card:#ffffff;
  --text:#111;
  --muted:#6b7280;
  --blue:#2563eb;
}

*{
  box-sizing:border-box;
  transition:.25s;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 30px;
  border-bottom:1px solid rgba(0,0,0,.08);
  background:white;
}

body.dark{
  --bg:#020617;
  --card:#0f172a;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

body.dark .header{
  background:#020617;
}

body.dark .info-box{
  background:var(--card);
}

.nav-wrapper{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

.toggle{
  cursor:pointer;
  font-size:22px;
  padding:6px 10px;
  border-radius:10px;
  background:var(--card);
  user-select:none;
}

.logo{
  font-weight:700;
  color:var(--blue);
  font-size:18px;
}

.nav{
  display:flex;
  gap:30px;
}

.nav a{
  text-decoration:none;
}

.nav-item{
  color:#6b7280;
  position:relative;
}

.nav-item.active{
  color:#111;
  font-weight:600;
}

.nav-item::after{
  content:"";
  position:absolute;
  bottom:-5px;
  left:0;
  width:0;
  height:2px;
  background:var(--blue);
  transition:.3s;
}

.nav-item:hover::after,
.nav-item.active::after{
  width:100%;
}


.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:38px;
  margin-bottom:10px;
}

.hero p{
  color:var(--muted);
}


.support{
  max-width:800px;
  margin:0 auto 80px;
  padding:0 20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 10px 20px rgba(0,0,0,.05);
}

.form-group{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:600;
}

input,
textarea{
  width:100%;
  border:none;
  background:#eef0f3;
  padding:14px;
  border-radius:12px;
  font-family:inherit;
  font-size:15px;
}

textarea{
  min-height:140px;
  resize:none;
}

button{
  border:none;
  background:var(--blue);
  color:white;
  padding:14px 22px;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
}

button:hover{
  transform:scale(1.03);
}


.info{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:30px;
}

.info-box{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 20px rgba(0,0,0,.04);
}

.info-box h4{
  margin-top:0;
}

.info-box p{
  color:var(--muted);
}
</style>
</head>

<body>

<div class="header">

  <div class="logo">✈️ TravelPay</div>

  <div class="nav-wrapper">
    <div class="nav">
      <a class="nav-item" href="zaplanuj podroz.html">Zaplanuj podróż</a>
      <a class="nav-item" href="pomoc.html">Porady</a>
      <a class="nav-item active" href="wsparcie.html">Wsparcie</a>
    </div>
  </div>

  <div class="toggle" onclick="toggleTheme()">🌙</div>

</div>

<div class="hero">
  <h1>Skontaktuj się z nami</h1>
  <p>Nasz zespół odpowiada zwykle w ciągu kilku godzin.</p>
</div>

<div class="support">

  <div class="card">

    <div class="form-group">
      <label>Imię</label>
      <input placeholder="Wpisz imię">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input placeholder="twoj@email.com">
    </div>

    <div class="form-group">
      <label>Wiadomość</label>
      <textarea placeholder="Opisz problem..."></textarea>
    </div>

    <button>Wyślij zgłoszenie</button>

  </div>

  <div class="info">

    <div class="info-box">
      <h4>📞 Telefon</h4>
      <p>+48 123 456 789</p>
    </div>

    <div class="info-box">
      <h4>📧 Email</h4>
      <p>support@travelpay.com</p>
    </div>

    <div class="info-box">
      <h4>🕒 Godziny pracy</h4>
      <p>Poniedziałek - Piątek<br>08:00 - 18:00</p>
    </div>

  </div>

</div>

<script>
function applyTheme(theme){
  if(theme === "dark"){
    document.body.classList.add("dark");
    document.querySelector(".toggle").innerText = "☀️";
  }else{
    document.body.classList.remove("dark");
    document.querySelector(".toggle").innerText = "🌙";
  }
}

function toggleTheme(){
  const isDark = document.body.classList.toggle("dark");

  localStorage.setItem("theme", isDark ? "dark" : "light");

  document.querySelector(".toggle").innerText =
    isDark ? "☀️" : "🌙";
}

applyTheme(localStorage.getItem("theme"));
</script>

</body>
</html>
